    Source: ~/Code/voxlabs/logos/F1-green-glow-c3.svg
    Re-framed from viewBox="-5 0 100 100" to "0 5 90 90" so the two
    parallelograms sit dead-center at favicon scale (32×32) with ~4px
    margin all sides. No cropping.
  -->
  <defs>
    <linearGradient id="a" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a5c36"/>
      <stop offset="100%" stop-color="#4dd88a"/>
    </linearGradient>
    <linearGradient id="b" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2a7a4e"/>
      <stop offset="100%" stop-color="#6ee7a0"/>
    </linearGradient>
    <clipPath id="c">
      <path d="M 4 10 L 30 10 L 56 90 L 30 90 Z"/>
    </clipPath>
  </defs>
  <path d="M 4 10 L 30 10 L 56 90 L 30 90 Z" fill="url(#a)"/>
  <path d="M 66 10 L 86 10 L 60 90 L 40 90 Z" fill="url(#b)"/>
  <path d="M 66 10 L 86 10 L 60 90 L 40 90 Z" fill="#a5f3c0" opacity="0.45" clip-path="url(#c)"/>
